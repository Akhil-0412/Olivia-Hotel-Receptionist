    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          curl -sSf "https://akhil-008-olivia-hotel-receptionist.hf.space/health" > /dev/null || echo "Ping failed but workflow continues"
